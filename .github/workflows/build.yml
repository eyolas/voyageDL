name: Build & Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            sidecars: "macos"
          - platform: windows-latest
            args: ""
            sidecars: "windows"
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache sidecars
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries
          key: sidecars-${{ matrix.sidecars }}-${{ hashFiles('scripts/download-sidecars.sh') }}

      - name: Install frontend dependencies
        run: npm install

      - name: Download sidecars (yt-dlp + ffmpeg)
        shell: bash
        run: |
          if [ -d "src-tauri/binaries" ] && [ "$(ls -A src-tauri/binaries 2>/dev/null)" ]; then
            echo "Sidecars already cached, skipping download"
            ls -lh src-tauri/binaries/
          else
            bash scripts/download-sidecars.sh ${{ matrix.sidecars }}
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Voyage DL ${{ github.ref_name }}"
          releaseBody: "Download the .msi (Windows) or .dmg (macOS) below."
          releaseDraft: true
          args: ${{ matrix.args }}
